<script>
  // ── Dados das farmácias ──────────────────────────────────────────────────────
  const farmacias = [
    { nome: "Drogaria Santo Antonio", apelido: "Farmácia do João",  telefone: "(17) 98163-1154" },
    { nome: "Drogaria São Pedro",     apelido: "Farmácia do Flávio", telefone: "(17) 98108-3876" },
    { nome: "Farma Nova",             apelido: "Farmácia do Zé",    telefone: "(17) 98133-2376" },
    { nome: "Drogaria Santa Izabel",  apelido: "Cohab I",           telefone: "(17) 98141-7800" },
    { nome: "Multidrogas",            apelido: "Farmácia do Tauan", telefone: "(17) 98187-3139" },
  ];

  // ── Lógica de rotação semanal (igual ao original) ───────────────────────────
  function ultimoSabadoAntes(hoje) {
    const dia = hoje.getDay();
    const diasParaTirar = dia === 6 ? 0 : dia + 1;
    const sabado = new Date(hoje);
    sabado.setDate(hoje.getDate() - diasParaTirar);
    return sabado;
  }

  const hoje            = new Date();
  const sabadoRef       = ultimoSabadoAntes(hoje);
  const primeiraData    = new Date("2026-05-02"); // sábado-âncora: começa no João
  const semanasPassadas = Math.floor((sabadoRef - primeiraData) / (7 * 24 * 60 * 60 * 1000));
  const farmacia        = farmacias[semanasPassadas % farmacias.length];

  // ── Preenche o DOM ───────────────────────────────────────────────────────────
  const dia = String(hoje.getDate()).padStart(2, '0');
  const mes = String(hoje.getMonth() + 1).padStart(2, '0');

  document.getElementById('titulo-plantao').textContent =
    `Farmácia de Plantão hoje (${dia}/${mes}) em Neves Paulista 🚨`;

  // ── Badge de status inteligente ─────────────────────────────────────────────
  const hora = hoje.getHours();
  const badge = document.getElementById('status-badge');
  if (hora >= 9 && hora < 22) {
    badge.textContent = 'ABERTA AGORA';
    badge.className = 'bg-secondary-container text-on-secondary-container font-label-bold text-label-bold px-sm py-1 rounded-full w-fit';
  } else if (hora >= 8 && hora < 9) {
    badge.textContent = 'ABRE ÀS 9H';
    badge.className = 'bg-primary-fixed text-on-primary-fixed font-label-bold text-label-bold px-sm py-1 rounded-full w-fit';
  } else {
    badge.textContent = 'FECHADA AGORA';
    badge.className = 'bg-error-container text-on-error-container font-label-bold text-label-bold px-sm py-1 rounded-full w-fit';
  }

  document.getElementById('farmacia-nome-principal').textContent = farmacia.nome;
  document.getElementById('farmacia-apelido').textContent        = farmacia.apelido;
  document.getElementById('farmacia-telefone').textContent       = farmacia.telefone;



  // ── Padding mobile para a bottom nav ────────────────────────────────────────
  if (window.innerWidth < 768) {
    document.body.style.paddingBottom = '64px';
  }
</script>
